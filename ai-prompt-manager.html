<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PromptVault · AI提示词管理器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&family=Source+Code+Pro:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --bg2: #12151c;
    --bg3: #181d27;
    --bg4: #1e2433;
    --surface: #222840;
    --border: #2a3150;
    --border2: #364070;
    --accent: #5b8dee;
    --accent2: #7c3aed;
    --accent3: #0ea5e9;
    --gold: #f59e0b;
    --rose: #f43f5e;
    --green: #10b981;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --card-h: 220px;
    --sidebar-w: 220px;
    --topbar-h: 52px;
  }
  body.light {
    --bg: #f0f2f7;
    --bg2: #ffffff;
    --bg3: #f7f8fc;
    --bg4: #eceef5;
    --surface: #e4e7f0;
    --border: #dde1ed;
    --border2: #c5cce0;
    --accent: #3b6fd4;
    --gold: #d97706;
    --rose: #e11d48;
    --green: #059669;
    --text: #1a1f2e;
    --text2: #4a5568;
    --text3: #9aa3b5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    font-size: 13px;
  }

  /* ── TOP MENU BAR ── */
  #topbar {
    height: var(--topbar-h);
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 8px;
    flex-shrink: 0;
    position: relative;
    z-index: 100;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    color: var(--accent);
    letter-spacing: 0.5px;
    margin-right: 8px;
    white-space: nowrap;
  }
  .logo span { color: var(--text2); font-size: 11px; font-family: 'Noto Sans SC', sans-serif; margin-left: 4px; }
  .divider-v { width: 1px; height: 28px; background: var(--border); margin: 0 4px; }
  .btn {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 6px;
    border: none; cursor: pointer; font-size: 12px;
    font-family: 'Noto Sans SC', sans-serif;
    transition: all .18s;
    white-space: nowrap;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #4a7de0; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(91,141,238,.35); }
  .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--bg4); color: var(--text); border-color: var(--border2); }
  .btn-icon { padding: 6px 8px; }
  .btn svg { width: 14px; height: 14px; flex-shrink: 0; }

  #search-wrap {
    flex: 1; max-width: 380px; margin-left: 4px;
    position: relative;
  }
  #search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--text3); }
  #searchInput {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); padding: 6px 10px 6px 32px;
    border-radius: 6px; font-size: 12px;
    font-family: 'Noto Sans SC', sans-serif;
    outline: none; transition: border .18s;
  }
  #searchInput:focus { border-color: var(--accent); }
  #searchInput::placeholder { color: var(--text3); }

  .spacer { flex: 1; }

  .view-btns { display: flex; gap: 2px; }
  .view-btn {
    padding: 5px 7px; background: transparent; border: 1px solid transparent;
    border-radius: 5px; cursor: pointer; color: var(--text3); transition: all .15s;
  }
  .view-btn.active, .view-btn:hover { background: var(--bg4); color: var(--accent); border-color: var(--border); }
  .view-btn svg { width: 14px; height: 14px; display: block; }

  /* ── LAYOUT ── */
  #layout { display: flex; flex: 1; overflow: hidden; }

  /* ── SIDEBAR ── */
  #sidebar {
    width: var(--sidebar-w);
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden; flex-shrink: 0;
  }
  .sidebar-search {
    padding: 10px; border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .sidebar-search input {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); padding: 5px 8px; border-radius: 5px;
    font-size: 11px; font-family: inherit; outline: none;
  }
  .sidebar-search input:focus { border-color: var(--accent); }
  .sidebar-search input::placeholder { color: var(--text3); }
  .sidebar-list { flex: 1; overflow-y: auto; padding: 6px 0; }
  .sidebar-list::-webkit-scrollbar { width: 3px; }
  .sidebar-list::-webkit-scrollbar-track { background: transparent; }
  .sidebar-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  .sidebar-section { padding: 6px 12px 2px; font-size: 10px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; }
  .cat-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 12px; cursor: pointer; border-radius: 0;
    transition: all .15s; position: relative; user-select: none;
  }
  .cat-item:hover { background: var(--bg3); }
  .cat-item.active { background: rgba(91,141,238,.12); }
  .cat-custom-actions { display: none; align-items: center; gap: 2px; margin-left: auto; }
  .cat-item:hover .cat-custom-actions { display: flex; }
  .cat-quick-btn {
    padding: 2px 4px; background: transparent; border: none;
    cursor: pointer; color: var(--text3); border-radius: 3px; transition: all .12s;
    display: flex; align-items: center;
  }
  .cat-quick-btn:hover { background: var(--bg4); color: var(--text2); }
  .cat-quick-btn.danger:hover { color: var(--rose); }
  .cat-item.active::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; background: var(--accent); border-radius: 0 2px 2px 0;
  }
  .cat-icon { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; }
  .cat-label { flex: 1; color: var(--text2); font-size: 12px; }
  .cat-item.active .cat-label { color: var(--text); }
  .cat-count {
    font-size: 10px; color: var(--text3); background: var(--bg4);
    padding: 1px 5px; border-radius: 10px; min-width: 18px; text-align: center;
  }
  .sidebar-footer {
    padding: 10px; border-top: 1px solid var(--border); flex-shrink: 0;
  }
  .btn-add-cat {
    width: 100%; display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 7px 10px; margin-bottom: 8px;
    background: transparent; border: 1px dashed var(--border2);
    border-radius: 6px; color: var(--text3); font-size: 11px;
    font-family: inherit; cursor: pointer; transition: all .15s;
  }
  .btn-add-cat:hover { border-color: var(--accent); color: var(--accent); background: rgba(91,141,238,.06); }

  /* Custom Category Modal */
  .cat-modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.65);
    display: flex; align-items: center; justify-content: center;
    z-index: 2000; backdrop-filter: blur(4px);
    animation: fadeIn .15s ease;
  }
  .cat-modal {
    background: var(--bg2); border: 1px solid var(--border2);
    border-radius: 12px; padding: 0; width: 480px; max-width: 95vw;
    box-shadow: 0 24px 64px rgba(0,0,0,.5);
    animation: slideUp .2s ease; overflow: hidden;
  }
  .cat-modal-header {
    padding: 18px 20px 14px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .cat-modal-header h3 { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .cat-modal-tabs {
    display: flex; border-bottom: 1px solid var(--border);
  }
  .cat-modal-tab {
    flex: 1; padding: 10px; background: transparent; border: none;
    color: var(--text3); font-size: 12px; font-family: inherit;
    cursor: pointer; transition: all .15s; border-bottom: 2px solid transparent;
    position: relative; bottom: -1px;
  }
  .cat-modal-tab.active { color: var(--accent); border-bottom-color: var(--accent); background: rgba(91,141,238,.05); }
  .cat-modal-body { padding: 18px 20px; max-height: 60vh; overflow-y: auto; }
  .cat-modal-body::-webkit-scrollbar { width: 3px; }
  .cat-modal-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* Create/Edit form */
  .cat-form-row { margin-bottom: 14px; }
  .cat-form-label { display: block; font-size: 11px; color: var(--text2); margin-bottom: 5px; }
  .cat-form-input {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); padding: 8px 10px; border-radius: 6px;
    font-size: 13px; font-family: inherit; outline: none; transition: border .18s;
  }
  .cat-form-input:focus { border-color: var(--accent); }
  .emoji-picker-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .emoji-opt {
    width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
    font-size: 16px; border-radius: 6px; cursor: pointer; border: 1px solid transparent;
    transition: all .12s; background: var(--bg4);
  }
  .emoji-opt:hover { border-color: var(--accent); transform: scale(1.1); }
  .emoji-opt.selected { border-color: var(--accent); background: rgba(91,141,238,.15); }
  .cat-form-preview {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    background: var(--bg3); border-radius: 8px; border: 1px solid var(--border);
    margin-bottom: 14px;
  }
  .cat-form-preview .preview-icon { font-size: 18px; }
  .cat-form-preview .preview-name { font-size: 13px; color: var(--text); }
  .cat-form-footer { display: flex; gap: 8px; justify-content: flex-end; padding-top: 4px; }

  /* Manage list */
  .cat-manage-list { display: flex; flex-direction: column; gap: 4px; }
  .cat-manage-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 8px;
    background: var(--bg3); border: 1px solid var(--border);
    transition: all .15s;
  }
  .cat-manage-item:hover { border-color: var(--border2); }
  .cat-manage-icon { font-size: 16px; width: 24px; text-align: center; flex-shrink: 0; }
  .cat-manage-name { flex: 1; font-size: 12px; color: var(--text2); }
  .cat-manage-count { font-size: 10px; color: var(--text3); background: var(--bg4); padding: 1px 6px; border-radius: 10px; }
  .cat-manage-actions { display: flex; gap: 4px; }
  .cat-manage-btn {
    padding: 4px 6px; background: transparent; border: 1px solid var(--border);
    border-radius: 5px; cursor: pointer; color: var(--text3); font-size: 11px;
    font-family: inherit; transition: all .12s; display: flex; align-items: center; gap: 3px;
  }
  .cat-manage-btn:hover { background: var(--bg4); color: var(--text2); border-color: var(--border2); }
  .cat-manage-btn.danger:hover { color: var(--rose); border-color: var(--rose); background: rgba(244,63,94,.08); }
  .cat-manage-empty { text-align: center; padding: 30px 20px; color: var(--text3); font-size: 12px; }
  .cat-manage-empty svg { display: block; margin: 0 auto 10px; opacity: .3; }
  .stats-row { display: flex; justify-content: space-between; font-size: 10px; color: var(--text3); }

  /* ── MAIN CONTENT ── */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  #toolbar {
    padding: 10px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    background: var(--bg2);
  }
  .breadcrumb { font-size: 13px; color: var(--text2); }
  .breadcrumb b { color: var(--text); }
  .sort-select {
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text2); padding: 4px 8px; border-radius: 5px;
    font-size: 11px; font-family: inherit; outline: none; cursor: pointer;
  }
  .sort-select:focus { border-color: var(--accent); }
  .filter-tag {
    padding: 3px 8px; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: var(--text3); font-size: 11px;
    cursor: pointer; font-family: inherit; transition: all .15s;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .filter-tag.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .filter-tag:hover:not(.active) { border-color: var(--border2); color: var(--text2); }

  #cards-wrap {
    flex: 1; overflow-y: auto; padding: 16px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
    align-content: start;
  }
  #cards-wrap::-webkit-scrollbar { width: 5px; }
  #cards-wrap::-webkit-scrollbar-track { background: transparent; }
  #cards-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* list view */
  #cards-wrap.view-list {
    grid-template-columns: 1fr;
    gap: 6px;
  }
  #cards-wrap.view-list .card {
    height: auto !important;
    min-height: 0;
    flex-direction: row;
    padding: 10px 14px;
    gap: 12px;
  }
  #cards-wrap.view-list .card-body { flex: 1; min-width: 0; }
  #cards-wrap.view-list .card-content { -webkit-line-clamp: 1; }
  #cards-wrap.view-list .card-tags { display: none; }
  #cards-wrap.view-list .card-title { font-size: 13px; margin-bottom: 2px; }

  /* compact view */
  #cards-wrap.view-compact {
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 8px;
  }
  #cards-wrap.view-compact .card { height: 160px !important; }
  #cards-wrap.view-compact .card-content { -webkit-line-clamp: 3; }

  /* ── CARD ── */
  .card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    height: var(--card-h);
    display: flex; flex-direction: column;
    cursor: pointer; transition: all .2s;
    position: relative; overflow: hidden;
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: transparent; transition: background .2s;
  }
  .card:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,.3); }
  .card:hover::before { background: var(--accent); }
  .card.pinned { border-color: var(--gold); }
  .card.pinned::before { background: var(--gold); }
  .card.favorited .card-fav { color: var(--rose); }

  .card-header { display: flex; align-items: flex-start; gap: 6px; margin-bottom: 8px; }
  .card-title {
    flex: 1; font-size: 14px; font-weight: 500; color: var(--text);
    line-height: 1.4; word-break: break-all;
  }
  .card-actions { display: flex; gap: 2px; flex-shrink: 0; }
  .card-btn {
    padding: 3px 5px; background: transparent; border: none; cursor: pointer;
    color: var(--text3); border-radius: 4px; transition: all .15s; font-size: 13px;
    line-height: 1;
  }
  .card-btn:hover { background: var(--bg4); color: var(--text2); }
  .card-fav { color: var(--text3); }
  .card-pin { color: var(--text3); }
  .card-pin.pinned { color: var(--gold); }

  .card-body { flex: 1; overflow: hidden; }
  .card-content {
    font-size: var(--content-size, 11px); color: var(--text2); line-height: 1.6;
    display: -webkit-box; -webkit-line-clamp: 4;
    -webkit-box-orient: vertical; overflow: hidden;
    font-family: 'JetBrains Mono', monospace;
    word-break: break-all;
  }

  .card-footer {
    display: flex; align-items: center; gap: 6px;
    margin-top: 10px; flex-shrink: 0;
  }
  .card-tags { display: flex; gap: 4px; flex: 1; flex-wrap: wrap; overflow: hidden; max-height: 20px; }
  .card-tag {
    padding: 1px 6px; border-radius: 3px; font-size: 10px;
    background: var(--bg4); color: var(--text3);
    border: 1px solid var(--border);
  }
  .card-meta { font-size: 10px; color: var(--text3); white-space: nowrap; }
  .card-copy-btn {
    padding: 4px 10px; background: var(--bg4); border: 1px solid var(--border);
    border-radius: 5px; color: var(--text2); font-size: 11px;
    cursor: pointer; font-family: inherit; transition: all .15s; flex-shrink: 0;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .card-copy-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .card-copy-btn.copied { background: var(--green); color: #fff; border-color: var(--green); }

  .badge-pin {
    position: absolute; top: 10px; right: 10px;
    font-size: 10px; color: var(--gold);
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    grid-column: 1 / -1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 60px 20px; color: var(--text3); gap: 12px;
  }
  .empty-state svg { width: 48px; height: 48px; opacity: .4; }
  .empty-state h3 { font-size: 16px; color: var(--text2); }
  .empty-state p { font-size: 12px; text-align: center; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.65);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; backdrop-filter: blur(4px);
    animation: fadeIn .15s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--bg2); border: 1px solid var(--border2);
    border-radius: 12px; padding: 24px; width: 560px; max-width: 95vw;
    box-shadow: 0 24px 64px rgba(0,0,0,.5);
    animation: slideUp .2s ease;
    max-height: 90vh; overflow-y: auto;
  }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal h2 { font-size: 16px; margin-bottom: 20px; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .form-row { margin-bottom: 14px; }
  .form-label { display: block; font-size: 11px; color: var(--text2); margin-bottom: 5px; letter-spacing: .3px; }
  .form-input, .form-textarea, .form-select {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); padding: 8px 10px; border-radius: 6px;
    font-size: 13px; font-family: inherit; outline: none; transition: border .18s;
    resize: vertical;
  }
  .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--accent); }
  .form-textarea { min-height: 120px; font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.6; }
  .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  .char-count { font-size: 10px; color: var(--text3); text-align: right; margin-top: 3px; }

  /* ── NOTIFICATION ── */
  #toast {
    position: fixed; bottom: max(24px, env(safe-area-inset-bottom, 24px)); right: 24px;
    background: var(--bg4); border: 1px solid var(--border2);
    color: var(--text); padding: 10px 16px; border-radius: 8px;
    font-size: 12px; z-index: 9999;
    transform: translateY(20px); opacity: 0;
    transition: all .25s; pointer-events: none;
    display: flex; align-items: center; gap: 8px;
    max-width: calc(100vw - 32px);
  }
  #toast.show { transform: translateY(0); opacity: 1; }

  /* ── DETAIL PANEL ── */
  #detail-panel {
    width: 0; background: var(--bg2); border-left: 1px solid var(--border);
    overflow: hidden; transition: width .25s ease; flex-shrink: 0;
    display: flex; flex-direction: column;
  }
  #detail-panel.open { width: 320px; }
  .detail-inner { width: 320px; padding: 20px; display: flex; flex-direction: column; gap: 14px; height: 100%; overflow-y: auto; }
  .detail-inner::-webkit-scrollbar { width: 3px; }
  .detail-inner::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .detail-title { font-size: 16px; font-weight: 600; line-height: 1.4; }
  .detail-content {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px;
    font-family: 'JetBrains Mono', monospace; font-size: 11.5px;
    line-height: 1.7; color: var(--text2); white-space: pre-wrap;
    word-break: break-all; flex: 1; min-height: 120px;
    overflow: scroll;
  }
  .detail-meta { font-size: 11px; color: var(--text3); display: flex; flex-direction: column; gap: 4px; }
  .detail-actions { display: flex; gap: 8px; }
  .detail-header { display: flex; align-items: center; justify-content: space-between; }

  /* Context menu */
  .ctx-menu {
    position: fixed; background: var(--bg3); border: 1px solid var(--border2);
    border-radius: 8px; padding: 4px; z-index: 2000;
    box-shadow: 0 8px 24px rgba(0,0,0,.4); min-width: 160px;
    animation: fadeIn .1s ease;
  }
  .ctx-item {
    padding: 7px 12px; cursor: pointer; border-radius: 5px;
    font-size: 12px; display: flex; align-items: center; gap: 8px;
    color: var(--text2); transition: all .1s;
  }
  .ctx-item:hover { background: var(--bg4); color: var(--text); }
  .ctx-item.danger { color: var(--rose); }
  .ctx-item.danger:hover { background: rgba(244,63,94,.1); }
  .ctx-divider { height: 1px; background: var(--border); margin: 3px 0; }

  /* Theme toggle */
  #theme-btn {
    padding: 5px 10px; background: var(--bg4); border: 1px solid var(--border);
    border-radius: 20px; cursor: pointer; color: var(--text2);
    font-size: 13px; display: flex; align-items: center; gap: 5px;
    transition: all .2s; white-space: nowrap; flex-shrink: 0;
  }
  #theme-btn:hover { border-color: var(--border2); color: var(--text); background: var(--bg3); }

  /* Scrollbar global */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── MOBILE OVERLAY for sidebar ── */
  #sidebar-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.5); z-index: 200;
  }
  #mob-menu-btn { display: none; }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    :root { --topbar-h: 48px; --sidebar-w: 240px; }

    /* topbar: hide some buttons on small screens */
    #topbar { padding: 0 10px; gap: 6px; }
    .logo span { display: none; }
    #mob-menu-btn { display: flex; }
    .divider-v { display: none; }
    #search-wrap { max-width: none; margin-left: 0; }
    #theme-label { display: none; }
    .view-btns { gap: 0; }
    /* hide import/export on mobile */
    #btn-import, #btn-export { display: none; }

    /* sidebar: slide in as drawer */
    #sidebar {
      position: fixed; left: 0; top: var(--topbar-h); bottom: 0;
      z-index: 210; transform: translateX(-100%);
      transition: transform .25s ease;
      box-shadow: 4px 0 20px rgba(0,0,0,.4);
    }
    #sidebar.mob-open { transform: translateX(0); }
    #sidebar-overlay.mob-open { display: block; }

    /* cards: single column, no fixed height */
    #cards-wrap {
      grid-template-columns: 1fr;
      padding: 10px;
      gap: 10px;
    }
    .card { height: auto !important; min-height: 160px; }
    .card-content { -webkit-line-clamp: 3; }

    /* toolbar: wrap on small screens */
    #toolbar { flex-wrap: wrap; gap: 6px; padding: 8px 10px; }
    #toolbar .spacer { display: none; }
    #breadcrumb { width: 100%; }
    .filter-tag { font-size: 10px; padding: 3px 7px; }
    .sort-select { font-size: 10px; }

    /* detail panel: full screen overlay on mobile */
    #detail-panel {
      position: fixed; inset: 0; top: var(--topbar-h);
      width: 0 !important; z-index: 150;
      transition: width .25s ease;
    }
    #detail-panel.open { width: 100% !important; }
    .detail-inner { width: 100% !important; }

    /* modal full screen on mobile */
    .modal { width: 100% !important; max-width: 100vw; border-radius: 16px 16px 0 0; margin-top: auto; }
    .modal-overlay { align-items: flex-end; }
    .form-row-2 { grid-template-columns: 1fr; }

    /* card actions: larger tap targets */
    .card-btn { padding: 5px 7px; font-size: 15px; }
    .card-copy-btn { padding: 6px 12px; font-size: 12px; }
  }

  @media (max-width: 480px) {
    #topbar { gap: 4px; padding: 0 8px; }
    .btn-primary span { display: none; }
    #theme-icon { font-size: 15px; }
  }

  /* ── SETTINGS PANEL ── */
  #settings-panel {
    position: fixed; top: 0; right: -380px; bottom: 0;
    width: 360px; background: var(--bg2);
    border-left: 1px solid var(--border);
    z-index: 500; display: flex; flex-direction: column;
    transition: right .28s cubic-bezier(.4,0,.2,1);
    box-shadow: -8px 0 40px rgba(0,0,0,.35);
  }
  #settings-panel.open { right: 0; }
  #settings-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.4);
    z-index: 499; display: none; backdrop-filter: blur(2px);
  }
  #settings-overlay.open { display: block; }

  .settings-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .settings-header h3 {
    font-size: 15px; font-weight: 600; color: var(--text);
    display: flex; align-items: center; gap: 8px;
  }
  .settings-close {
    background: transparent; border: none; cursor: pointer;
    color: var(--text3); padding: 4px; border-radius: 4px;
    transition: all .15s; display: flex; align-items: center;
  }
  .settings-close:hover { background: var(--bg4); color: var(--text); }

  .settings-body { flex: 1; overflow-y: auto; padding: 16px 20px 24px; }
  .settings-body::-webkit-scrollbar { width: 3px; }
  .settings-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .settings-section {
    margin-bottom: 24px;
  }
  .settings-section-title {
    font-size: 10px; font-weight: 600; color: var(--text3);
    text-transform: uppercase; letter-spacing: 1.2px;
    margin-bottom: 12px; padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 6px;
  }
  .settings-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0; gap: 12px;
  }
  .settings-row + .settings-row { border-top: 1px solid rgba(255,255,255,.04); }
  .settings-label {
    font-size: 12px; color: var(--text2); flex: 1;
  }
  .settings-label small { display: block; font-size: 10px; color: var(--text3); margin-top: 1px; }

  /* Slider */
  .settings-slider-wrap { display: flex; align-items: center; gap: 8px; }
  .settings-slider {
    -webkit-appearance: none; appearance: none;
    width: 110px; height: 4px; border-radius: 2px;
    background: var(--border2); outline: none; cursor: pointer;
    transition: background .15s;
  }
  .settings-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    border-radius: 50%; background: var(--accent);
    cursor: pointer; transition: transform .15s;
    box-shadow: 0 0 0 3px rgba(91,141,238,.2);
  }
  .settings-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }
  .settings-slider::-moz-range-thumb {
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent); cursor: pointer; border: none;
  }
  .slider-val {
    font-size: 11px; color: var(--accent); font-family: 'JetBrains Mono', monospace;
    min-width: 28px; text-align: right;
  }

  /* Toggle switch */
  .settings-toggle {
    position: relative; width: 36px; height: 20px; flex-shrink: 0;
  }
  .settings-toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-track {
    position: absolute; inset: 0; background: var(--border2);
    border-radius: 10px; cursor: pointer; transition: background .2s;
  }
  .toggle-track::after {
    content: ''; position: absolute; top: 3px; left: 3px;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--text3); transition: all .2s;
  }
  .settings-toggle input:checked + .toggle-track { background: var(--accent); }
  .settings-toggle input:checked + .toggle-track::after {
    left: 19px; background: #fff;
  }

  /* Select */
  .settings-select {
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); padding: 5px 8px; border-radius: 6px;
    font-size: 12px; font-family: inherit; outline: none; cursor: pointer;
    min-width: 120px;
  }
  .settings-select:focus { border-color: var(--accent); }

  /* Color swatches */
  .color-swatches { display: flex; gap: 8px; flex-wrap: wrap; }
  .color-swatch {
    width: 24px; height: 24px; border-radius: 50%; cursor: pointer;
    border: 2px solid transparent; transition: all .15s;
    position: relative;
  }
  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.active { border-color: var(--text); }
  .color-swatch.active::after {
    content: ''; position: absolute; inset: 4px;
    border-radius: 50%; background: rgba(255,255,255,.5);
  }

  /* Reset button */
  .settings-reset {
    width: 100%; padding: 9px; background: transparent;
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text3); font-size: 12px; font-family: inherit;
    cursor: pointer; transition: all .15s; margin-top: 8px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .settings-reset:hover { border-color: var(--rose); color: var(--rose); background: rgba(244,63,94,.06); }

  @media (max-width: 768px) {
    #settings-panel { width: 100%; right: -100%; }
    #settings-panel.open { right: 0; }
  }
</style>
</head>
<body>

<script>
// ══════════════════════════════════════════════
//  DATA
// ══════════════════════════════════════════════
const BASE_CATEGORIES = [
  { id:'all',     icon:'🗂️',  label:'全部提示词' },
  { id:'fav',     icon:'⭐',  label:'我的收藏' },
  { id:'pin',     icon:'📌',  label:'置顶提示词' },
  { id:'recent',  icon:'🕐',  label:'最近使用' },
  { id:'---' },
  { id:'writing', icon:'✍️',  label:'写作创作' },
  { id:'coding',  icon:'💻',  label:'编程开发' },
  { id:'analysis',icon:'📊',  label:'数据分析' },
  { id:'translate',icon:'🌐', label:'翻译语言' },
  { id:'summary', icon:'📝',  label:'总结摘要' },
  { id:'email',   icon:'📧',  label:'邮件沟通' },
  { id:'seo',     icon:'🔍',  label:'SEO优化' },
  { id:'social',  icon:'📱',  label:'社交媒体' },
  { id:'image',   icon:'🎨',  label:'图像生成' },
  { id:'video',   icon:'🎬',  label:'视频脚本' },
  { id:'product', icon:'🚀',  label:'产品设计' },
  { id:'market',  icon:'📣',  label:'营销策划' },
  { id:'legal',   icon:'⚖️',  label:'法律文书' },
  { id:'edu',     icon:'🎓',  label:'教育学习' },
  { id:'research',icon:'🔬',  label:'研究调研' },
  { id:'hr',      icon:'👥',  label:'人力资源' },
  { id:'finance', icon:'💰',  label:'财务金融' },
  { id:'health',  icon:'🏥',  label:'健康医疗' },
  { id:'travel',  icon:'✈️',  label:'旅行规划' },
  { id:'food',    icon:'🍳',  label:'美食烹饪' },
  { id:'story',   icon:'📖',  label:'故事创作' },
  { id:'roleplay',icon:'🎭',  label:'角色扮演' },
  { id:'debug',   icon:'🐛',  label:'调试排错' },
  { id:'system',  icon:'⚙️',  label:'系统指令' },
  { id:'other',   icon:'📦',  label:'其他' },
];

let customCategories = [];
let CATEGORIES = [...BASE_CATEGORIES];

let CAT_MAP = {};
function rebuildCatMap() {
  CAT_MAP = {};
  CATEGORIES.forEach(c => { if(c.id !== '---') CAT_MAP[c.id] = c; });
}
rebuildCatMap();

const SAMPLE_PROMPTS = [
  { id:'p1', title:'专业代码审查', content:'请对以下代码进行专业审查，指出潜在的性能问题、安全漏洞、可读性问题，并给出改进建议。请以结构化方式输出，使用 Markdown 格式。\n\n[粘贴代码]', cat:'coding', tags:['代码','审查','优化'], fav:true, pin:true, usedCount:15, createdAt:Date.now()-86400000*5, updatedAt:Date.now()-3600000, note:'' },
  { id:'p2', title:'SEO文章生成器', content:'请帮我写一篇关于 [主题] 的 SEO 优化文章，要求：\n1. 字数 1500-2000 字\n2. 包含关键词：[关键词]\n3. 标题吸引眼球\n4. 有清晰的段落结构\n5. 结尾有行动号召（CTA）', cat:'seo', tags:['SEO','文章','内容营销'], fav:false, pin:false, usedCount:8, createdAt:Date.now()-86400000*3, updatedAt:Date.now()-7200000, note:'' },
  { id:'p3', title:'邮件润色优化', content:'请帮我优化以下邮件，使其更加专业、礼貌、简洁。保持核心意思不变，但改善措辞和结构。\n\n原始邮件：\n[邮件内容]', cat:'email', tags:['邮件','润色','商务'], fav:true, pin:false, usedCount:22, createdAt:Date.now()-86400000*10, updatedAt:Date.now()-1800000, note:'' },
  { id:'p4', title:'产品需求文档', content:'基于以下产品想法，帮我生成一份完整的产品需求文档（PRD），包含：\n- 产品概述与目标\n- 用户故事\n- 功能需求\n- 非功能需求\n- 验收标准\n\n产品想法：[描述]', cat:'product', tags:['PRD','产品','需求'], fav:false, pin:true, usedCount:6, createdAt:Date.now()-86400000*7, updatedAt:Date.now()-86400000, note:'' },
  { id:'p5', title:'代码解释器', content:'请详细解释以下代码的功能、逻辑和工作原理。如果有复杂的算法或设计模式，请特别说明。同时指出这段代码的优缺点。\n\n```\n[代码]\n```', cat:'coding', tags:['代码','解释','学习'], fav:false, pin:false, usedCount:11, createdAt:Date.now()-86400000*2, updatedAt:Date.now()-3600000*2, note:'' },
  { id:'p6', title:'故事创作框架', content:'帮我创作一个 [类型] 短篇故事，要求：\n- 主角：[角色描述]\n- 背景：[世界观/时代]\n- 核心冲突：[冲突类型]\n- 字数：[字数要求]\n- 风格：[叙事风格]\n\n请注意情节发展的起承转合，结局需要出人意料但合乎逻辑。', cat:'story', tags:['故事','创作','小说'], fav:true, pin:false, usedCount:4, createdAt:Date.now()-86400000*1, updatedAt:Date.now()-900000, note:'' },
];

let state = {
  prompts: [],
  activeCat: 'all',
  activeFilter: 'all',
  view: 'grid',
  editingId: null,
  detailId: null,
  search: '',
};

// ══════════════════════════════════════════════
//  LOCALSTORAGE
// ══════════════════════════════════════════════
function save() {
  localStorage.setItem('pv_prompts', JSON.stringify(state.prompts));
  localStorage.setItem('pv_state', JSON.stringify({ activeCat: state.activeCat, view: state.view }));
}
function saveCustomCats() {
  localStorage.setItem('pv_custom_cats', JSON.stringify(customCategories));
}
function load() {
  const p = localStorage.getItem('pv_prompts');
  const s = localStorage.getItem('pv_state');
  const cc = localStorage.getItem('pv_custom_cats');
  if(p) state.prompts = JSON.parse(p);
  else { state.prompts = SAMPLE_PROMPTS; save(); }
  if(s) { const sv = JSON.parse(s); state.activeCat = sv.activeCat || 'all'; state.view = sv.view || 'grid'; }
  if(cc) {
    customCategories = JSON.parse(cc);
    rebuildCategories();
  }
}
function rebuildCategories() {
  CATEGORIES = [...BASE_CATEGORIES];
  if(customCategories.length > 0) {
    CATEGORIES.push({ id:'---' });
    CATEGORIES.push(...customCategories);
  }
  rebuildCatMap();
}

// ══════════════════════════════════════════════
//  SIDEBAR
// ══════════════════════════════════════════════
function renderSidebar() {
  const list = document.getElementById('catList');
  const query = document.getElementById('catSearch').value.toLowerCase();
  const counts = {};
  state.prompts.forEach(p => {
    counts[p.cat] = (counts[p.cat]||0) + 1;
    counts['all'] = (counts['all']||0) + 1;
    if(p.fav) counts['fav'] = (counts['fav']||0) + 1;
    if(p.pin) counts['pin'] = (counts['pin']||0) + 1;
  });
  const recentCount = state.prompts.filter(p => p.updatedAt && Date.now() - p.updatedAt < 86400000*7).length;
  counts['recent'] = recentCount;

  let html = '';
  CATEGORIES.forEach(c => {
    if(c.id === '---') { html += '<div class="ctx-divider" style="margin:4px 8px"></div>'; return; }
    if(query && !c.label.toLowerCase().includes(query)) return;
    const cnt = counts[c.id] || 0;
    const act = state.activeCat === c.id ? ' active' : '';
    const isCustom = customCategories.some(x => x.id === c.id);
    html += `<div class="cat-item${act}" onclick="selectCat('${c.id}')">
      <span class="cat-icon">${c.icon}</span>
      <span class="cat-label">${c.label}</span>
      ${cnt > 0 ? `<span class="cat-count">${cnt}</span>` : ''}
      ${isCustom ? `<span class="cat-custom-actions" onclick="event.stopPropagation()">
        <button class="cat-quick-btn" title="编辑" onclick="openEditCat('${c.id}')">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="cat-quick-btn danger" title="删除" onclick="deleteCat('${c.id}')">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        </button>
      </span>` : ''}
    </div>`;
  });
  list.innerHTML = html;

  const builtinCount = BASE_CATEGORIES.filter(c => c.id !== '---' && !['all','fav','pin','recent'].includes(c.id)).length;
  const catCount = builtinCount + customCategories.length;
  document.getElementById('stat-total').textContent = `共 ${state.prompts.length} 条提示词`;
  document.getElementById('stat-cats').textContent = `${catCount} 个分类`;
}
function filterCats() { renderSidebar(); }
function selectCat(id) {
  state.activeCat = id;
  state.activeFilter = 'all';
  document.querySelectorAll('.filter-tag').forEach(b => b.classList.remove('active'));
  document.getElementById('filter-all').classList.add('active');
  closeMobileSidebar();
  save(); render();
}

// ══════════════════════════════════════════════
//  CARDS
// ══════════════════════════════════════════════
function getFiltered() {
  let list = [...state.prompts];
  // category
  if(state.activeCat === 'fav') list = list.filter(p => p.fav);
  else if(state.activeCat === 'pin') list = list.filter(p => p.pin);
  else if(state.activeCat === 'recent') list = list.filter(p => p.updatedAt && Date.now()-p.updatedAt < 86400000*7);
  else if(state.activeCat !== 'all') list = list.filter(p => p.cat === state.activeCat);
  // filter
  if(state.activeFilter === 'fav') list = list.filter(p => p.fav);
  else if(state.activeFilter === 'pin') list = list.filter(p => p.pin);
  // search
  if(state.search) {
    const q = state.search.toLowerCase();
    list = list.filter(p =>
      p.title.toLowerCase().includes(q) ||
      p.content.toLowerCase().includes(q) ||
      (p.tags||[]).some(t => t.toLowerCase().includes(q))
    );
  }
  // sort
  const sort = document.getElementById('sortSelect').value;
  if(sort === 'newest') list.sort((a,b) => b.createdAt - a.createdAt);
  else if(sort === 'oldest') list.sort((a,b) => a.createdAt - b.createdAt);
  else if(sort === 'az') list.sort((a,b) => a.title.localeCompare(b.title));
  else if(sort === 'used') list.sort((a,b) => (b.usedCount||0) - (a.usedCount||0));
  else if(sort === 'updated') list.sort((a,b) => (b.updatedAt||0) - (a.updatedAt||0));
  // pinned first
  list.sort((a,b) => (b.pin?1:0) - (a.pin?1:0));
  return list;
}

function renderCards() {
  const wrap = document.getElementById('cards-wrap');
  const list = getFiltered();
  const cat = CAT_MAP[state.activeCat];
  document.getElementById('breadcrumb').innerHTML = `<b>${cat ? cat.icon + ' ' + cat.label : '全部提示词'}</b> <span style="color:var(--text3);font-size:11px;margin-left:6px">${list.length} 条</span>`;
  if(!list.length) {
    wrap.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg><h3>暂无提示词</h3><p>点击顶部「新建提示词」按钮开始创建</p></div>`;
    return;
  }
  wrap.innerHTML = list.map(p => cardHTML(p)).join('');
}

function pinSVG(active) {

function cardHTML(p) {
  const tags = (p.tags||[]).map(t => `<span class="card-tag">${escHtml(t)}</span>`).join('');
  const date = new Date(p.createdAt).toLocaleDateString('zh-CN', {month:'numeric',day:'numeric'});

  const favCls = p.fav ? ' favorited' : '';
  return `<div class="card${pinCls}${favCls}" id="card-${p.id}" onclick="openDetail('${p.id}')" oncontextmenu="showCtx(event,'${p.id}')">

      <div class="card-title">${escHtml(p.title)}</div>
      <div class="card-actions" onclick="event.stopPropagation()">
        <button class="card-btn card-fav" title="${p.fav?'取消收藏':'收藏'}" onclick="toggleFav('${p.id}')">${starSVG(p.fav)}</button>
        <button class="card-btn card-pin" title="${p.pin?'取消置顶':'置顶'}" onclick="togglePin('${p.id}')">${pinSVG(p.pin)}</button>
        <button class="card-btn" title="编辑" onclick="openModal('${p.id}')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>

        <button class="card-btn" title="删除" style="color:var(--rose)" onclick="deletePromptClick(event,'${p.id}')">

        </button>
      </div>
    </div>
    <div class="card-body">
      <div class="card-content">${escHtml(p.content)}</div>
    </div>
    <div class="card-footer">
      <div class="card-tags">${tags}</div>
      <span class="card-meta" id="meta-${p.id}">${date} · <span id="cnt-${p.id}">${p.usedCount||0}</span>次</span>
      <button class="card-copy-btn" id="copy-${p.id}" onclick="copyPrompt(event,'${p.id}')">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        复制
      </button>
    </div>
  </div>`;
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function copyPrompt(event, id) {
  event.stopPropagation();
  const p = state.prompts.find(x => x.id === id);
  if(!p) return;
  navigator.clipboard.writeText(p.content).then(() => {
    p.usedCount = (p.usedCount||0) + 1;
    p.updatedAt = Date.now();
    save();
    // update count in place without full re-render
    const cntEl = document.getElementById('cnt-'+id);
    if(cntEl) cntEl.textContent = p.usedCount;
    const btn = document.getElementById('copy-'+id);
    if(btn) {
      btn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg> 已复制`;
      btn.classList.add('copied');
      setTimeout(()=>{
        btn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> 复制`;
        btn.classList.remove('copied');
      }, 1800);
    }
    toast('已复制到剪贴板');
    renderSidebar();
  }).catch(() => {
    // fallback for environments without clipboard API
    const ta = document.createElement('textarea');
    ta.value = p.content; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    p.usedCount = (p.usedCount||0) + 1; p.updatedAt = Date.now(); save();
    const cntEl = document.getElementById('cnt-'+id);
    if(cntEl) cntEl.textContent = p.usedCount;
    const btn = document.getElementById('copy-'+id);
    if(btn) {
      btn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg> 已复制`;
      btn.classList.add('copied');
      setTimeout(()=>{
        btn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> 复制`;
        btn.classList.remove('copied');
      }, 1800);
    }
    toast('已复制到剪贴板');
    renderSidebar();
  });
}

function toggleFav(id) {
  const p = state.prompts.find(x => x.id === id);

}
function togglePin(id) {

}
function deletePromptClick(e, id) {
  e.stopPropagation();

}

function showDeleteConfirm(id) {
  removeCtx();
  // remove any existing confirm overlay first
  const existing = document.getElementById('delete-confirm-overlay');
  if(existing) existing.remove();
  const p = state.prompts.find(x=>x.id===id); if(!p) return;
  const overlay = document.createElement('div');
  overlay.id = 'delete-confirm-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:3000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)';
  overlay.innerHTML = `<div style="background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:24px;width:min(340px,90vw);box-shadow:0 20px 50px rgba(0,0,0,.5)">
    <div style="font-size:15px;font-weight:600;margin-bottom:8px;color:var(--text)">删除提示词</div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:20px;line-height:1.6">确定要删除「<b style="color:var(--text)">${escHtml(p.title)}</b>」吗？此操作无法撤销。</div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button id="del-cancel" style="padding:7px 16px;background:transparent;border:1px solid var(--border);border-radius:6px;cursor:pointer;color:var(--text2);font-family:inherit;font-size:12px">取消</button>
      <button id="del-confirm" style="padding:7px 16px;background:var(--rose);border:none;border-radius:6px;cursor:pointer;color:#fff;font-family:inherit;font-size:12px">确认删除</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  document.getElementById('del-cancel').addEventListener('click', () => overlay.remove());
  document.getElementById('del-confirm').addEventListener('click', () => {
    overlay.remove();
    state.prompts = state.prompts.filter(x => x.id !== id);
    if(state.detailId === id) closeDetail();
    save(); render();
    toast('已删除');
  });
  overlay.addEventListener('click', e => { if(e.target === overlay) overlay.remove(); });
}
function dupPrompt(id) {
  const p = state.prompts.find(x => x.id === id);
  if(!p) return;
  const np = {...p, id:'p'+Date.now(), title:p.title+' (副本)', pin:false, createdAt:Date.now(), updatedAt:Date.now(), usedCount:0};
  state.prompts.unshift(np);
  save(); render();
  toast('已复制提示词副本');
}

//  MODAL
// ══════════════════════════════════════════════
function openModal(id=null) {
  state.editingId = id;
  document.getElementById('modal-title').textContent = id ? '编辑提示词' : '新建提示词';
  // populate cat select
  const sel = document.getElementById('f-cat');
  sel.innerHTML = CATEGORIES.filter(c => c.id !== '---' && !['all','fav','pin','recent'].includes(c.id))
    .map(c => `<option value="${c.id}">${c.icon} ${c.label}</option>`).join('');
  if(id) {
    const p = state.prompts.find(x => x.id === id);
    if(p) {
      document.getElementById('f-title').value = p.title;
      document.getElementById('f-content').value = p.content;
      document.getElementById('f-tags').value = (p.tags||[]).join(', ');
      document.getElementById('f-note').value = p.note||'';
      sel.value = p.cat;
    }
  } else {
    document.getElementById('f-title').value = '';
    document.getElementById('f-content').value = '';
    document.getElementById('f-tags').value = '';
    document.getElementById('f-note').value = '';
    if(!['all','fav','pin','recent'].includes(state.activeCat)) sel.value = state.activeCat;
  }
  updateCharCount();
  document.getElementById('modal').style.display = 'flex';
  setTimeout(() => document.getElementById('f-title').focus(), 50);
}
function closeModal() { document.getElementById('modal').style.display = 'none'; }
function closeModalOutside(e) { if(e.target.id === 'modal') closeModal(); }
function updateCharCount() {
  const len = document.getElementById('f-content').value.length;
  document.getElementById('char-count').textContent = len;
}

function savePrompt() {
  const title = document.getElementById('f-title').value.trim();
  const content = document.getElementById('f-content').value.trim();
  if(!title) { document.getElementById('f-title').focus(); return; }
  if(!content) { document.getElementById('f-content').focus(); return; }
  const tags = document.getElementById('f-tags').value.split(/[,，]/).map(t=>t.trim()).filter(Boolean);
  const cat = document.getElementById('f-cat').value;
  const note = document.getElementById('f-note').value.trim();
  if(state.editingId) {
    const p = state.prompts.find(x => x.id === state.editingId);
    if(p) { p.title=title; p.content=content; p.tags=tags; p.cat=cat; p.note=note; p.updatedAt=Date.now(); }
  } else {
    state.prompts.unshift({ id:'p'+Date.now(), title, content, cat, tags, fav:false, pin:false, usedCount:0, createdAt:Date.now(), updatedAt:Date.now(), note });
  }
  save(); render(); closeModal();
  toast(state.editingId ? '已更新' : '已创建');
}

function closeDetail() {

function copyFromDetail(id) {

    openDetail(id);

  navigator.clipboard.writeText(p.content).then(doCopy).catch(() => {
    const ta = document.createElement('textarea');

}

    <div class="ctx-item" onclick="togglePin('${id}')">

        ? `<svg width="13" height="13" viewBox="0 0 24 24" fill="var(--gold)" stroke="var(--gold)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="17" x2="12" y2="22"/><path d="M5 17h14v-1.76a2 2 0 00-1.11-1.79l-1.78-.9A2 2 0 0115 10.76V6h1a2 2 0 000-4H8a2 2 0 000 4h1v4.76a2 2 0 01-1.11 1.79l-1.78.9A2 2 0 005 15.24V17z"/></svg> 取消置顶`
        : `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="17" x2="12" y2="22"/><path d="M5 17h14v-1.76a2 2 0 00-1.11-1.79l-1.78-.9A2 2 0 0115 10.76V6h1a2 2 0 000-4H8a2 2 0 000 4h1v4.76a2 2 0 01-1.11 1.79l-1.78.9A2 2 0 005 15.24V17z"/></svg> 置顶`}
    </div>
    <div class="ctx-divider"></div>
    <div class="ctx-item danger" onclick="removeCtx();showDeleteConfirm('${id}')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
      删除
    </div>
  `;
  document.body.appendChild(menu);
  ctxMenu = menu;
  // boundary check
  const r = menu.getBoundingClientRect();
  if(r.right > window.innerWidth) menu.style.left = (e.clientX - r.width) + 'px';
  if(r.bottom > window.innerHeight) menu.style.top = (e.clientY - r.height) + 'px';
}
function removeCtx() { if(ctxMenu) { ctxMenu.remove(); ctxMenu = null; } }

function exportPrompts() {
  const data = JSON.stringify(state.prompts, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'promptvault-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  toast('导出成功');
}
function importPrompts() { document.getElementById('importFile').click(); }
function handleImport(e) {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if(Array.isArray(data)) {
        state.prompts = [...data, ...state.prompts];
        save(); render();
        toast(`已导入 ${data.length} 条提示词`);
      }
    } catch { toast('文件格式错误'); }
    e.target.value = '';
  };
  reader.readAsText(file);
}

  const name = document.getElementById('cat-f-name').value.trim();
  if (!name) { document.getElementById('cat-f-name').focus(); return; }

    const cat = customCategories.find(c => c.id === catEditingId);

  rebuildCategories();
  render();

  const cat = customCategories.find(c => c.id === id);

  catEditingId = id;
  catSelectedEmoji = cat.icon;
  document.getElementById('cat-f-name').value = cat.label;
  document.getElementById('cat-preview-icon').textContent = cat.icon;

function deleteCat(id) {
  const cat = customCategories.find(c => c.id === id);
  if (!cat) return;
  const count = state.prompts.filter(p => p.cat === id).length;
  const msg = count > 0
    ? `确定删除分类「${cat.label}」？该分类下 ${count} 条提示词将移至「其他」。`
    : `确定删除分类「${cat.label}」？`;
  // reuse delete confirm style
  const existing = document.getElementById('delete-confirm-overlay');
  if (existing) existing.remove();
  const overlay = document.createElement('div');
  overlay.id = 'delete-confirm-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:3000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)';
  overlay.innerHTML = `<div style="background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:24px;width:min(340px,90vw);box-shadow:0 20px 50px rgba(0,0,0,.5)">
    <div style="font-size:15px;font-weight:600;margin-bottom:8px;color:var(--text)">删除分类</div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:20px;line-height:1.6">${msg}</div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button id="del-cancel" style="padding:7px 16px;background:transparent;border:1px solid var(--border);border-radius:6px;cursor:pointer;color:var(--text2);font-family:inherit;font-size:12px">取消</button>
      <button id="del-confirm" style="padding:7px 16px;background:var(--rose);border:none;border-radius:6px;cursor:pointer;color:#fff;font-family:inherit;font-size:12px">确认删除</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  document.getElementById('del-cancel').addEventListener('click', () => overlay.remove());
  document.getElementById('del-confirm').addEventListener('click', () => {
    overlay.remove();
    // move prompts to 'other'
    state.prompts.forEach(p => { if (p.cat === id) p.cat = 'other'; });
    customCategories = customCategories.filter(c => c.id !== id);
    if (state.activeCat === id) state.activeCat = 'all';
    saveCustomCats(); save(); rebuildCategories(); render();
    toast('分类已删除');
  });
  overlay.addEventListener('click', e => { if(e.target === overlay) overlay.remove(); });
}

function renderCatManageList() {
  const list = document.getElementById('cat-manage-list');
  if (!customCategories.length) {
    list.innerHTML = `<div class="cat-manage-empty">

  const counts = {};
  state.prompts.forEach(p => { counts[p.cat] = (counts[p.cat]||0) + 1; });

const SETTINGS_DEFAULTS = {
  fontSize: 13,
  contentSize: 11,
  fontFamily: 'noto',
  contentFont: 'jetbrains',
  sidebarW: 220,
  cardMinW: 280,
  cardH: 220,
  detailW: 320,
  animations: true,
  compactToolbar: false,
  lineHeight: '1.6',
  accent: '#5b8dee',
  accentLight: '#3b6fd4',
};
let settings = { ...SETTINGS_DEFAULTS };

const FONT_MAP = {
  noto: "'Noto Sans SC', sans-serif",
  system: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif",
  serif: "'Georgia', 'Noto Serif SC', serif",
};
const CONTENT_FONT_MAP = {
  jetbrains: "'JetBrains Mono', monospace",
  sourcecode: "'Source Code Pro', monospace",
  mono: "ui-monospace, 'Cascadia Code', 'Consolas', monospace",
  sans: "'Noto Sans SC', -apple-system, sans-serif",
};

function loadSettings() {
  const saved = localStorage.getItem('pv_settings');
  if (saved) {
    try { settings = { ...SETTINGS_DEFAULTS, ...JSON.parse(saved) }; } catch {}
  }
  applyAllSettings();
  syncSettingsUI();
}

function saveSettings() {
  localStorage.setItem('pv_settings', JSON.stringify(settings));
}

function applyAllSettings() {
  const r = document.documentElement.style;
  r.setProperty('--sidebar-w', settings.sidebarW + 'px');
  r.setProperty('--card-h', settings.cardH === 0 ? 'auto' : settings.cardH + 'px');
  r.setProperty('--detail-w-custom', settings.detailW + 'px');
  document.body.style.fontSize = settings.fontSize + 'px';
  document.body.style.fontFamily = FONT_MAP[settings.fontFamily] || FONT_MAP.noto;

  // content font size via CSS var
  r.setProperty('--content-size', settings.contentSize + 'px');

  // card min width
  r.setProperty('--card-min-w', settings.cardMinW + 'px');

  // detail panel width
  const dp = document.getElementById('detail-panel');
  if (dp) { dp.style.setProperty('--detail-w', settings.detailW + 'px'); }
  // override detail panel open width
  const styleId = 'pv-dynamic-style';
  let styleEl = document.getElementById(styleId);
  if (!styleEl) { styleEl = document.createElement('style'); styleEl.id = styleId; document.head.appendChild(styleEl); }
  styleEl.textContent = `
    #detail-panel.open { width: ${settings.detailW}px !important; }
    .detail-inner { width: ${settings.detailW}px !important; }
    #cards-wrap { grid-template-columns: repeat(auto-fill, minmax(${settings.cardMinW}px, 1fr)); }
    .card-content { font-size: ${settings.contentSize}px !important; line-height: ${settings.lineHeight} !important; font-family: ${CONTENT_FONT_MAP[settings.contentFont] || CONTENT_FONT_MAP.jetbrains} !important; }
    .detail-content { line-height: ${settings.lineHeight} !important; font-family: ${CONTENT_FONT_MAP[settings.contentFont] || CONTENT_FONT_MAP.jetbrains} !important; overflow: auto;}
    .form-textarea { font-family: ${CONTENT_FONT_MAP[settings.contentFont] || CONTENT_FONT_MAP.jetbrains} !important; }
    ${!settings.animations ? `
      *, *::before, *::after { transition: none !important; animation: none !important; }
      .card:hover { transform: none !important; }
    ` : ''}
    ${settings.compactToolbar ? `
      #toolbar { padding: 6px 12px !important; }
      #topbar { height: 44px !important; }
    ` : ''}
    ${settings.accent ? `
      :root { --accent: ${settings.accent}; }
      body.light { --accent: ${settings.accentLight}; }
    ` : ''}
  `;

  // accent color swatches
  document.querySelectorAll('.color-swatch').forEach(s => {
    s.classList.toggle('active', s.dataset.accent === settings.accent);
  });
}

function syncSettingsUI() {
  const set = (id, val) => { const el = document.getElementById(id); if (el) el.value = val; };
  const setTxt = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
  set('s-fontsize', settings.fontSize);       setTxt('v-fontsize', settings.fontSize + 'px');
  set('s-contentsize', settings.contentSize); setTxt('v-contentsize', settings.contentSize + 'px');
  set('s-fontfamily', settings.fontFamily);
  set('s-contentfont', settings.contentFont);
  set('s-sidebar', settings.sidebarW);        setTxt('v-sidebar', settings.sidebarW + 'px');
  set('s-cardw', settings.cardMinW);          setTxt('v-cardw', settings.cardMinW + 'px');
  set('s-cardh', settings.cardH);             setTxt('v-cardh', settings.cardH === 0 ? '自适应' : settings.cardH + 'px');
  set('s-detailw', settings.detailW);         setTxt('v-detailw', settings.detailW + 'px');
  set('s-lineheight', settings.lineHeight);
  const anim = document.getElementById('s-anim'); if (anim) anim.checked = settings.animations;
  const ct = document.getElementById('s-compact-toolbar'); if (ct) ct.checked = settings.compactToolbar;
}

function applySetting(key, value) {
  if (['fontSize','contentSize','sidebarW','cardMinW','cardH','detailW'].includes(key)) {
    value = Number(value);
  } else if (key === 'animations' || key === 'compactToolbar') {
    value = Boolean(value);
  }
  settings[key] = value;

  // update display label
  const labels = {
    fontSize: ['v-fontsize', v => v + 'px'],
    contentSize: ['v-contentsize', v => v + 'px'],
    sidebarW: ['v-sidebar', v => v + 'px'],
    cardMinW: ['v-cardw', v => v + 'px'],
    cardH: ['v-cardh', v => v === 0 ? '自适应' : v + 'px'],
    detailW: ['v-detailw', v => v + 'px'],
  };
  if (labels[key]) {
    const [id, fmt] = labels[key];
    const el = document.getElementById(id);
    if (el) el.textContent = fmt(value);
  }
  applyAllSettings();
  saveSettings();
}

function setAccent(el) {
  settings.accent = el.dataset.accent;
  settings.accentLight = el.dataset.accentLight;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  applyAllSettings();
  saveSettings();
}

function openSettings() {
  document.getElementById('settings-panel').classList.add('open');
  document.getElementById('settings-overlay').classList.add('open');
  document.getElementById('settings-btn').style.color = 'var(--accent)';
}
function closeSettings() {
  document.getElementById('settings-panel').classList.remove('open');
  document.getElementById('settings-overlay').classList.remove('open');
  document.getElementById('settings-btn').style.color = '';
}

function resetSettings() {
  settings = { ...SETTINGS_DEFAULTS };
  applyAllSettings();
  syncSettingsUI();
  saveSettings();
  toast('已恢复默认设置');
}
